name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-format:
    name: Lint Format (Clang-Format)
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Run Clang-Format Check
      run: ./caffeine-build/scripts/build.sh linux-native caffeine-app-mvp-format

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Run Analysis
      run: ./caffeine-build/scripts/build.sh linux-native caffeine-app-mvp-analyze

  build-stm32:
    name: Build STM32 Targets
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        preset: [blinky-board-ex1, blinky-board-ex2]
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Build ${{ matrix.preset }}
      run: ./caffeine-build/scripts/build.sh ${{ matrix.preset }}

  build-and-test:
    name: Native Build & Unit Tests
    runs-on: ubuntu-24.04
    needs: [lint-format]
    permissions:
      contents: read
      pull-requests: write
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Build and Run Tests
      run: ./caffeine-build/scripts/build.sh unit-tests-gtest all

    - name: Run Coverage
      run: ./caffeine-build/scripts/build.sh unit-tests-gtest caffeine-app-mvp-coverage

    - name: PR Comment with Coverage
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        github-token: ${{secrets.GITHUB_TOKEN}}
        script: |
          const fs = require('fs');
          const coverage = fs.readFileSync('build/unit-tests-gtest/coverage.txt', 'utf8');
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '### Code Coverage Report 📊\n```\n' + coverage + '\n```'
          })
